<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Baggo Check</title>
</head>
<body>
  <p>Cargando...</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      window.location.href = 'https://www.baggo.es';
    } else {
      fetch('https://hook.eu1.make.com/mrckrnypnyg41do2wh946u6mb3eeqmc9?reserva_id=' + id)
        .then(r => r.json())
        .then(data => {
          const base_entrada = 'https://form.jotform.com/261583126431352';
          const base_salida  = 'https://form.jotform.com/261442577056359';

          const nombreParts = (data.nombre || '').trim().split(' ');
          const firstName = nombreParts[0] || '';
          const lastName  = nombreParts.slice(1).join(' ') || '';

          // Fecha en formato DD-MM-YYYY para litemode
          function formatFecha(f) {
            if (!f) return '';
            const parts = f.trim().split(' ');
            return parts[0] + '-' + parts[1] + '-' + parts[2];
          }

          // Separar prefijo y número
          function splitTelefono(t) {
            if (!t) return ['', ''];
            const clean = t.replace(/\s/g, '');
            const match = clean.match(/^\+?(\d{2})(\d+)$/);
            if (match) return [match[1], match[2]];
            return ['', clean];
          }

          // Separar hora y minutos
          function splitHora(h) {
            if (!h) return ['', ''];
            return (h || '').split(':');
          }

          const tel = splitTelefono(data.telefono);
          const he = splitHora(data.hora_entrega);
          const hr = splitHora(data.hora_recogida);

          const p = new URLSearchParams({
            'q2_fullname0[first]':       firstName,
            'q2_fullname0[last]':        lastName,
            'email':                     data.email  || '',
            'numeroDe[area]':            tel[0],
            'numeroDe[phone]':           tel[1],
            'q5_dropdown3':              data.local  || '',
            'fechaInicio[litemode]':     formatFecha(data.fecha_inicio),
            'fechaFinal[litemode]':      formatFecha(data.fecha_fin),
            'horaEntrega[hour]':         he[0],
            'horaEntrega[min]':          he[1],
            'hora31[hour]':              hr[0],
            'hora31[min]':               hr[1],
            'bolsoO':                    data.mochila || '0',
            'maletaDe':                  data.cabina  || '0',
            'maletaGrande':              data.grande  || '0',
          });

          if (data.estado === 'Pendiente' || data.estado === 'Confirmada') {
            window.location.href = base_entrada + '?' + p.toString();
          } else if (data.estado === 'En custodia') {
            window.location.href = base_salida + '?' + p.toString();
          } else {
            window.location.href = 'https://www.baggo.es';
          }
        });
    }
  </script>
</body>
</html>
